# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: context-aware-vision-grounded-kb-agent
metadata:
    template: context-aware-vision-grounded-kb-agent
services:
    agent:
        project: ./src/agent
        host: containerapp
        language: python
        docker:
            path: ./Dockerfile
    func-convert-cu:
        project: ./src/functions
        host: containerapp
        language: python
        docker:
            path: ./fn_convert_cu/Dockerfile
    func-convert-markitdown:
        project: ./src/functions
        host: containerapp
        language: python
        docker:
            path: ./fn_convert_markitdown/Dockerfile
    func-convert-mistral:
        project: ./src/functions
        host: containerapp
        language: python
        docker:
            path: ./fn_convert_mistral/Dockerfile
    func-index:
        project: ./src/functions
        host: containerapp
        language: python
        docker:
            path: ./fn_index/Dockerfile
    web-app:
        project: ./src/web-app
        host: containerapp
        language: python
        docker:
            path: ./Dockerfile
infra:
    provider: bicep
    path: infra
    module: main
hooks:
    postprovision:
        shell: sh
        run: |
            # Add redirect URIs to the Entra App Registration.
            # This script is idempotent and CI/CD-safe.
            # If it fails (e.g. Graph API CAE), run standalone: make azure-setup-auth
            bash scripts/setup-redirect-uris.sh || \
              echo "WARNING: Could not update redirect URIs. Run 'make azure-setup-auth' after fixing Graph API auth."

            # AI Gateway ↔ Foundry linking (portal-only, no ARM/CLI API available)
            echo ""
            echo "=============================================="
            echo "  AI Gateway Manual Configuration Required"
            echo "=============================================="
            echo ""
            echo "The APIM instance '${APIM_NAME}' is deployed."
            echo "Link it to Foundry as AI Gateway via the portal:"
            echo ""
            echo "  1. Go to https://ai.azure.com"
            echo "  2. Enable 'New Foundry' toggle"
            echo "  3. Operate > Admin console > AI Gateway tab"
            echo "  4. Click 'Add AI Gateway'"
            echo "  5. Select Foundry resource: ${AI_SERVICES_NAME}"
            echo "  6. Choose 'Use existing' > select: ${APIM_NAME}"
            echo "  7. Name the gateway and click 'Add'"
            echo "  8. After status shows 'Enabled', click the gateway name"
            echo "  9. Add project '${FOUNDRY_PROJECT_NAME}' to the gateway"
            echo ""
            echo "=============================================="
    preprovision:
        name: preprovision
        shell: sh
        run: |
            # Validate PROJECT_NAME is set (should be done via: make set-project name=<name>).
            if ! azd env get-value PROJECT_NAME >/dev/null 2>&1; then
              echo "ERROR: PROJECT_NAME is not set. Run: make set-project name=<your-name>"
              exit 1
            fi

            # Ensure AZURE_PRINCIPAL_ID is set for deployer RBAC role assignments.
            if ! azd env get-value AZURE_PRINCIPAL_ID >/dev/null 2>&1; then
              PRINCIPAL_ID=$(az ad signed-in-user show --query id -o tsv 2>/dev/null || true)
              if [ -n "$PRINCIPAL_ID" ]; then
                azd env set AZURE_PRINCIPAL_ID "$PRINCIPAL_ID"
                echo "Set AZURE_PRINCIPAL_ID=$PRINCIPAL_ID"
              else
                echo "WARNING: Could not determine signed-in user principal ID. Deployer RBAC roles will be skipped."
              fi
            fi

            # Export AZURE_ENV_NAME for sub-scripts
            AZURE_ENV_NAME=$(azd env get-value AZURE_ENV_NAME 2>/dev/null || true)
            export AZURE_ENV_NAME

            # Ensure the resource group exists (AZD v1.23+ prompts instead of auto-creating).
            RG_NAME=$(azd env get-value AZURE_RESOURCE_GROUP 2>/dev/null || true)
            LOCATION=$(azd env get-value AZURE_LOCATION 2>/dev/null || echo "eastus2")
            if [ -n "$RG_NAME" ]; then
              az group create --name "$RG_NAME" --location "$LOCATION" --output none 2>/dev/null && \
                echo "Resource group '$RG_NAME' ready in $LOCATION" || \
                echo "WARNING: Could not create resource group '$RG_NAME'. It may already exist."
            fi

            # Set up Entra App Registration for web app Easy Auth
            bash scripts/setup-entra-auth.sh
