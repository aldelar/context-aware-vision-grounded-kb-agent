services:
  fn-convert:
    build:
      context: ./src/functions
      dockerfile: ./fn_convert_markitdown/Dockerfile
    env_file:
      - ./.env.dev
    environment:
      OTEL_SERVICE_NAME: fn-convert
      AzureWebJobsStorage: ${AZURITE_CONNECTION_STRING}
    ports:
      - "7071:80"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('127.0.0.1', 80), 2); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - kb-agent-dev

  fn-index:
    build:
      context: ./src/functions
      dockerfile: ./fn_index/Dockerfile
    env_file:
      - ./.env.dev
    environment:
      OTEL_SERVICE_NAME: fn-index
      AzureWebJobsStorage: ${AZURITE_CONNECTION_STRING}
    ports:
      - "7072:80"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('127.0.0.1', 80), 2); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - kb-agent-dev

  agent:
    build:
      context: ./src/agent
      dockerfile: ./Dockerfile
    env_file:
      - ./.env.dev
    environment:
      OTEL_SERVICE_NAME: kb-agent
      WEB_SEARCH_MCP_ENDPOINT: http://mcp-web-search:8089/mcp
    ports:
      - "8088:8088"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('127.0.0.1', 8088), 2); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    depends_on:
      mcp-web-search:
        condition: service_healthy
    networks:
      - kb-agent-dev

  mcp-web-search:
    build:
      context: ./src/mcp-web-search
      dockerfile: ./Dockerfile
    environment:
      ENVIRONMENT: dev
      MCP_PORT: "8089"
    ports:
      - "8089:8089"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('127.0.0.1', 8089), 2); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - kb-agent-dev

  web-app:
    build:
      context: ./src/web-app
      dockerfile: ./Dockerfile
    env_file:
      - ./.env.dev
    environment:
      OTEL_SERVICE_NAME: kb-web-app
    volumes:
      - ./kb/serving:/app/kb/serving:ro
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "const net=require('node:net'); const s=net.createConnection({host:'127.0.0.1', port:3000}, ()=>{s.end(); process.exit(0);}); s.on('error', ()=>process.exit(1)); setTimeout(()=>process.exit(1), 2000);"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - kb-agent-dev

networks:
  kb-agent-dev:
    external: true
    name: kb-agent-dev